<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>용어 복습</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="data.js"></script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
        }

        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            backface-visibility: hidden;
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <div class="flex flex-wrap gap-2 mb-10 justify-center" id="flt-nav">
        </div>

        <div id="flash-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        const grid = document.getElementById('flash-grid');
        const nav = document.getElementById('flt-nav');
        let currentFilter = '전체보기';

        function render() {
            grid.innerHTML = DB.filter(i => currentFilter === '전체보기' || i.category === currentFilter)
                .map(item => `
                <div class="h-64 perspective-1000" onclick="this.querySelector('.card-inner').classList.toggle('is-flipped')">
                    <div class="card-inner relative w-full h-full shadow-lg rounded-[32px]">
                        <div class="card-face card-front bg-white rounded-[32px] border-2 border-slate-100 flex flex-col items-center justify-center p-6 text-center">
                            <div class="text-4xl mb-4">${item.icon}</div>
                            <h3 class="text-xl font-black text-slate-900 uppercase tracking-tight">${item.term}</h3>
                            <div class="mt-4 px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-bold">${item.category}</div>
                        </div>
                        <div class="card-face card-back bg-indigo-600 rounded-[32px] flex flex-col items-center justify-center p-8 text-center text-white">
                            <p class="text-lg font-bold leading-relaxed mb-4">${item.shortDesc}</p>
                            <div class="text-[12px] opacity-70 leading-snug">${item.detailDesc}</div>
                        </div>
                    </div>
                </div>
            `).join('');

            nav.innerHTML = categories.map(c => `
                <button onclick="setFilter('${c}')" class="px-4 py-2 rounded-xl text-sm font-bold transition-all ${currentFilter === c ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-500 hover:bg-slate-100 border border-slate-200'}">
                    ${c}
                </button>
            `).join('');
        }

        function setFilter(c) {
            currentFilter = c;
            render();
        }

        window.onload = render;
    </script>
</body>

</html>
