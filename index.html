<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바이브 코딩 - 통합 학습 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'], mono: ['D2Coding', 'Consolas', 'monospace'] },
                    colors: { primary: '#4f46e5', darkBg: '#f8fafc', cardBg: '#ffffff', accent: '#6366f1' }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.02em;
        }
    </style>
</head>

<body
    class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden selection:bg-indigo-100 selection:text-indigo-900">

    <header
        class="bg-white/90 backdrop-blur-md border-b border-slate-200 z-30 px-6 py-3 flex flex-col md:flex-row justify-between items-center shrink-0 shadow-sm relative">
        <div class="flex items-center gap-5 w-full md:w-auto">
            <button onclick="loadFrame('lesson.html', document.getElementById('btn-lesson'))"
                class="text-xl font-extrabold text-indigo-700 flex items-center gap-2 hover:opacity-80 transition-opacity shrink-0"
                title="바이브 코딩 홈">
                <span
                    class="text-2xl bg-indigo-100 text-indigo-600 w-10 h-10 flex items-center justify-center rounded-xl shadow-inner">✨</span>
                바이브 코딩
            </button>
        </div>

        <nav class="flex gap-1 sm:gap-2 mt-3 md:mt-0 flex-wrap" id="main-nav">
            <button id="btn-lesson"
                class="nav-btn px-3 sm:px-4 py-2 rounded-xl font-semibold text-[14px] sm:text-[15px] transition-all bg-indigo-100 text-indigo-700 shadow-sm"
                data-src="lesson.html">
                1. 코딩 레슨
            </button>
            <button
                class="nav-btn px-3 sm:px-4 py-2 rounded-xl font-semibold text-[14px] sm:text-[15px] transition-all text-slate-600 hover:bg-slate-100"
                data-src="dictionary.html">
                2. 용어 설명
            </button>
            <button
                class="nav-btn px-3 sm:px-4 py-2 rounded-xl font-semibold text-[14px] sm:text-[15px] transition-all text-slate-600 hover:bg-slate-100"
                data-src="sandbox.html">
                3. 용어 실습
            </button>
            <button
                class="nav-btn px-3 sm:px-4 py-2 rounded-xl font-semibold text-[14px] sm:text-[15px] transition-all text-slate-600 hover:bg-slate-100"
                data-src="flashcard.html">
                4. 용어 복습
            </button>
            <button
                class="nav-btn px-3 sm:px-4 py-2 rounded-xl font-semibold text-[14px] sm:text-[15px] transition-all text-slate-600 hover:bg-slate-100"
                data-src="concepts.html">
                5. 디자인 컨셉
            </button>
        </nav>
    </header>

    <main class="flex-1 relative bg-slate-50 overflow-hidden flex">
        <iframe id="main-frame" src="lesson.html" class="w-full h-full border-none" title="콘텐츠 프레임"
            allow="clipboard-read; clipboard-write"></iframe>
    </main>

    <script>
        // --- Iframe Navigation Logic ---
        const iframe = document.getElementById('main-frame');
        const navButtons = document.querySelectorAll('.nav-btn');

        function loadFrame(src, activeBtn) {
            // 1. Iframe 소스 변경
            iframe.src = src;

            // 2. 모든 버튼 스타일 초기화 (비활성 상태)
            navButtons.forEach(btn => {
                btn.classList.remove('bg-indigo-100', 'text-indigo-700', 'shadow-sm');
                btn.classList.add('text-slate-600', 'hover:bg-slate-100');
            });

            // 3. 클릭된 버튼 스타일 적용 (활성 상태)
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-600', 'hover:bg-slate-100');
                activeBtn.classList.add('bg-indigo-100', 'text-indigo-700', 'shadow-sm');
            }
        }

        // 버튼들에 클릭 이벤트 리스너 할당
        navButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const src = e.currentTarget.getAttribute('data-src');
                loadFrame(src, e.currentTarget);
            });
        });

        // 초기 아이콘 렌더링
        window.onload = () => {
            lucide.createIcons();
        };
    </script>

</body>

</html>
