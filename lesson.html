        function formatMarkdown(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-indigo-600">$1</strong>');
        }

        const accordionContainer = document.getElementById('accordion-container');

        lessonData.forEach((lesson) => {
            const itemHTML = `
                <div class="bg-cardBg rounded-3xl border border-slate-200 shadow-sm transition-all duration-300 hover:border-indigo-300 hover:shadow-md overflow-hidden group">
                    <header class="px-6 py-5 cursor-pointer flex items-center justify-between" onclick="toggleAccordion(${lesson.id})">
                        <div class="flex items-center gap-5">
                            <div class="w-12 h-12 rounded-2xl bg-indigo-50 border border-indigo-100 flex items-center justify-center font-black text-lg text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all duration-300">
                                ${lesson.id}
                            </div>
                            <div>
                                <h3 class="text-lg font-black text-slate-800 tracking-tight group-hover:text-indigo-600 transition-colors">${lesson.title}</h3>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${lesson.topic}</span>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <div class="flex items-center gap-1.5 p-1.5 bg-slate-50 rounded-2xl border border-slate-100" onclick="event.stopPropagation()">
                                <div class="select-wrapper">
                                    <select id="ai-select-${lesson.id}" class="bg-white text-slate-600 text-xs font-bold pl-3 pr-8 py-1.5 focus:outline-none appearance-none cursor-pointer border border-slate-200 rounded-xl shadow-sm focus:ring-2 focus:ring-indigo-200">
                                        <option value="gemini">Gemini</option>
                                        <option value="chatgpt">ChatGPT</option>
                                        <option value="claude">Claude</option>
                                        <option value="grok">Grok</option>
                                    </select>
                                </div>
                                <button onclick="handleMentoring(${lesson.id})" title="보통 멘토링 프롬프트" class="p-2 hover:bg-indigo-600 bg-indigo-50 rounded-xl transition-all group/btn">
                                    <i data-lucide="brain-circuit" class="w-5 h-5 text-indigo-600 group-hover/btn:text-white transition-colors"></i>
                                </button>
                                <button onclick="openSlides(${lesson.id})" title="슬라이드 열기" class="p-2 hover:bg-indigo-600 bg-indigo-50 rounded-xl transition-all group/btn">
                                    <i data-lucide="presentation" class="w-5 h-5 text-indigo-600 group-hover/btn:text-white transition-colors"></i>
                                </button>
                                <button onclick="toggleQnA(${lesson.id}, event)" title="심화 Q&A" class="p-2 hover:bg-indigo-600 bg-indigo-50 rounded-xl transition-all group/btn">
                                    <i data-lucide="message-circle-question" class="w-5 h-5 text-indigo-600 group-hover/btn:text-white transition-colors"></i>
                                </button>
                            </div>
                            <div class="p-1.5">
                                <i data-lucide="chevron-down" id="chevron-${lesson.id}" class="chevron-icon w-5 h-5 text-slate-300"></i>
                            </div>
                        </div>
                    </header>
                    
                    <div id="content-${lesson.id}" class="accordion-content px-8">
                        <div class="pt-4 border-t border-slate-50">
                            <div class="bg-indigo-50/30 rounded-2xl p-6 border border-indigo-100/50 mb-6 relative overflow-hidden">
                                <div class="flex items-start gap-5">
                                    <div class="p-3 bg-white rounded-xl shadow-sm border border-indigo-50">
                                        <i data-lucide="info" class="w-6 h-6 text-indigo-500"></i>
                                    </div>
                                    <div class="space-y-4 flex-1">
                                        <p class="text-[15px] text-slate-600 font-bold leading-relaxed">
                                            "${lesson.summary}"
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div id="qna-section-${lesson.id}" class="hidden p-8 bg-white rounded-[2rem] border-2 border-indigo-100 shadow-xl overflow-hidden relative">
                                <div class="absolute -right-8 -top-8 text-indigo-50/50">
                                    <i data-lucide="help-circle" class="w-40 h-40"></i>
                                </div>
                                
                                <div class="space-y-6 relative z-10 max-w-3xl mx-auto">
                                    <div class="flex items-center justify-between border-b-2 border-indigo-50 pb-4 mb-2">
                                        <h4 class="text-sm font-black text-indigo-900 flex items-center gap-2">
                                            💡 이 차시에서 꼭 물어봐야 할 질문 목록
                                        </h4>
                                        <div class="flex items-center gap-3">
                                            <div class="select-wrapper">
                                                <select id="qna-ai-select-${lesson.id}" class="bg-slate-50 border border-slate-200 text-slate-600 text-[12px] font-bold pl-4 pr-9 py-2 rounded-xl focus:ring-4 focus:ring-indigo-100 outline-none appearance-none cursor-pointer">
                                                    <option value="gemini">Gemini AI</option>
                                                    <option value="chatgpt">ChatGPT-4o</option>
                                                    <option value="claude">Claude 3.5</option>
                                                    <option value="grok">Grok-3</option>
                                                </select>
                                            </div>
                                            <button onclick="handleQnAMentoring(${lesson.id})" class="px-6 py-2 bg-gradient-to-r from-indigo-600 to-accent text-white rounded-xl text-[12px] font-black shadow-lg shadow-indigo-500/30 active:scale-95 transition-all flex items-center gap-2">
                                                멘토학습 <i data-lucide="sparkles" class="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <ul id="qna-list-${lesson.id}" class="grid gap-3">
                                        <!-- JS -->
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            accordionContainer.insertAdjacentHTML('beforeend', itemHTML);
        });

        lucide.createIcons();

        function toggleAccordion(id) {
            const content = document.getElementById(`content-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            const card = content.parentElement;
            const isOpen = content.classList.contains('open');

            document.querySelectorAll('.accordion-content').forEach(el => {
                if (el.id !== `content-${id}`) {
                    el.classList.remove('open');
                    document.getElementById(`chevron-${el.id.split('-')[1]}`).classList.remove('rotated');
                    el.parentElement.classList.remove('ring-4', 'ring-indigo-100');
                }
            });

            if (isOpen) {
                content.classList.remove('open');
                chevron.classList.remove('rotated');
                card.classList.remove('ring-4', 'ring-indigo-100');
            } else {
                content.classList.add('open');
                chevron.classList.add('rotated');
                card.classList.add('ring-4', 'ring-indigo-100');
            }
        }

        function toggleQnA(id, event) {
            if (event) event.stopPropagation();
            const content = document.getElementById(`content-${id}`);
            const qnaSection = document.getElementById(`qna-section-${id}`);
            const lesson = lessonData.find(l => l.id === id);

            if (!content.classList.contains('open')) toggleAccordion(id);

            if (qnaSection.classList.contains('hidden')) {
                qnaSection.classList.remove('hidden');
                const listEl = document.getElementById(`qna-list-${id}`);
                listEl.innerHTML = lesson.qaList.map((q, i) => `
                    <li class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-[14px] font-bold text-slate-700 flex gap-4 hover:bg-white hover:border-indigo-300 transition-all group/qa">
                        <span class="text-indigo-400 group-hover/qa:text-indigo-600 transition-colors">${i + 1}.</span> ${q}
                    </li>
                `).join('');
                setTimeout(() => qnaSection.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
            } else {
                qnaSection.classList.add('hidden');
            }
        }

        function handleMentoring(id) {
            const lesson = lessonData.find(l => l.id === id);
            const selectEl = document.getElementById(`ai-select-${id}`);
            const selectedAI = selectEl.value;

            const lessonDesc = lesson.slides.map(s => s.desc).join(' ');
            const fullPrompt = `나는 아주아주 초보자야. 내가 현재 학습 중인 주제는 '${lesson.title}'이야.\n\n학습한 핵심 내용은 다음과 같아:\n${lessonDesc}\n\n나의 멘토가 되어줘. 이 내용을 매우 쉽게 설명해주고, 내가 꼭 알아야 할 팁 3가지를 정리해줘.`;

            navigator.clipboard.writeText(fullPrompt).then(() => {
                showToast("Basic Prompt Copied", "멘토링 프롬프트가 복사되었습니다.");
                setTimeout(() => window.open(aiUrls[selectedAI], '_blank'), 1000);
            });
        }

        function handleQnAMentoring(id) {
            const lesson = lessonData.find(l => l.id === id);
            const selectEl = document.getElementById(`qna-ai-select-${id}`);
            const selectedAI = selectEl.value;

            const slideSummaries = lesson.slides.map((s, idx) => `Stage ${idx + 1}: ${s.desc}`).join('\n');
            const questions = lesson.qaList.map((q, i) => `${i + 1}. ${q}`).join('\n');

            const fullPrompt = `나는 아주아주 초보자야. 내가 현재 학습 중인 주제는 '${lesson.title}'이야.
학습한 핵심 내용은 다음과 같아:
${slideSummaries}

그리고 이와 관련해서 내가 실무적으로 궁금해할 만한 질문 목록은 다음과 같아:
${questions}

나의 멘토가 되어줘. 위 질문 목록을 나에게 다시 보기 좋게 제시해 주고, '원하는 질문의 번호를 입력하면 매우 쉽고 자세하게 설명해 주겠다'고 안내해 줘. 내가 번호를 입력하기 전까지는 절대 먼저 답변하지 마.`;

            navigator.clipboard.writeText(fullPrompt).then(() => {
                showToast("Q&A Prompt Copied", "심화 질문 목록과 프롬프트가 복사되었습니다.");
                setTimeout(() => window.open(aiUrls[selectedAI], '_blank'), 1000);
            });
        }

        function showToast(title, sub) {
            const toast = document.getElementById('toast');
            toast.querySelector('p.font-black').textContent = title;
            toast.querySelector('p.text-xs').textContent = sub;
            toast.classList.remove('opacity-0', 'translate-y-40');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-40'), 4000);
        }

        let currentSession = null;
        let currentSlideIndex = 0;
        const modal = document.getElementById('slide-modal');
        const slideTitleEl = document.getElementById('slide-title');
        const slideDescEl = document.getElementById('slide-desc');
        const slideDiagramEl = document.getElementById('slide-diagram');
        const slideLinksEl = document.getElementById('slide-links');
        const slideBadge = document.getElementById('slide-badge');
        const slideIndicator = document.getElementById('slide-indicator');
        const progressBar = document.getElementById('progress-bar');
        const btnPrev = document.getElementById('btn-prev-slide');
        const btnNext = document.getElementById('btn-next-slide');

        function openSlides(lessonId) {
            currentSession = lessonData.find(l => l.id === lessonId);
            currentSlideIndex = 0;
            document.getElementById('modal-title').textContent = currentSession.title;
            document.getElementById('modal-session-badge').textContent = `SESSION ${String(currentSession.id).padStart(2, '0')}`;
            renderSlide();
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('opacity-100', 'translate-y-0'), 50);
            document.body.style.overflow = 'hidden';
        }

        function closeSlides() {
            modal.classList.remove('opacity-100', 'translate-y-0');
            setTimeout(() => modal.classList.add('hidden'), 500);
            document.body.style.overflow = 'auto';
        }

        document.getElementById('btn-close-modal').addEventListener('click', closeSlides);

        function renderSlide() {
            const slide = currentSession.slides[currentSlideIndex];
            const total = currentSession.slides.length;
            slideBadge.textContent = `STAGE ${String(currentSlideIndex + 1).padStart(2, '0')}`;
            slideTitleEl.innerHTML = formatMarkdown(slide.title);
            slideDiagramEl.textContent = slide.diagram;
            slideDescEl.innerHTML = formatMarkdown(slide.desc);
            slideIndicator.textContent = `${String(currentSlideIndex + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
            progressBar.style.width = `${((currentSlideIndex + 1) / total) * 100}%`;
            slideLinksEl.innerHTML = '';
            if (slide.links) {
                slide.links.forEach(link => {
                    const btn = document.createElement('a');
                    btn.href = link.url; btn.target = '_blank';
                    btn.className = "flex items-center gap-2 px-6 py-3 bg-indigo-600 text-white rounded-xl text-[14px] font-black shadow-md hover:bg-indigo-500 transition-all";
                    btn.innerHTML = `<i data-lucide="external-link" class="w-4 h-4"></i> ${link.name}`;
                    slideLinksEl.appendChild(btn);
                });
                lucide.createIcons();
            }
            btnPrev.disabled = currentSlideIndex === 0;
            btnNext.disabled = currentSlideIndex === total - 1;
        }

        function nextSlide() { if (currentSlideIndex < currentSession.slides.length - 1) { currentSlideIndex++; renderSlide(); } }
        function prevSlide() { if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); } }
        btnNext.addEventListener('click', nextSlide);
        btnPrev.addEventListener('click', prevSlide);
        document.getElementById('btn-next-mobile').addEventListener('click', nextSlide);
        document.getElementById('btn-prev-mobile').addEventListener('click', prevSlide);
        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('hidden')) {
                if (e.key === 'ArrowRight') nextSlide();
                if (e.key === 'ArrowLeft') prevSlide();
                if (e.key === 'Escape') closeSlides();
            }
        });
    </script>
