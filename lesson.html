        tailwind.config = {

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
        }

        .accordion-content.open {
            max-height: 500px;
            /* Large enough to fit content */
            padding-top: 1rem;
            padding-bottom: 1.5rem;
        }

        .chevron-icon {
            transition: transform 0.3s ease;
        }

        .chevron-icon.rotated {
            transform: rotate(180deg);
        }

        .slide-content {
            white-space: pre-line;
        }

        /* Premium Diagram Styling */
        .diagram-box {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.8));
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.1);
        }

            accordionContainer.insertAdjacentHTML('beforeend', itemHTML);
        });

        lucide.createIcons();

        // 1. Accordion Logic
        function toggleAccordion(id) {
            const content = document.getElementById(`content-${id}`);
            const shadow = content.parentElement;
            const chevron = document.getElementById(`chevron-${id}`);
            const isOpen = content.classList.contains('open');

            // Close all others
            document.querySelectorAll('.accordion-content').forEach(el => {
                if (el.id !== `content-${id}`) {
                    el.classList.remove('open');
                    document.getElementById(`chevron-${el.id.split('-')[1]}`).classList.remove('rotated');
                    el.parentElement.classList.remove('ring-2', 'ring-blue-500/20');
                }
            });

            if (isOpen) {
                content.classList.remove('open');
                chevron.classList.remove('rotated');
                shadow.classList.remove('ring-2', 'ring-blue-500/20');
            } else {
                content.classList.add('open');
                chevron.classList.add('rotated');
                shadow.classList.add('ring-2', 'ring-blue-500/20');
            }
        }

        // 4. AI Mentoring Logic (Advanced Context Injection)
        function handleMentoring(id) {
            const lesson = lessonData.find(l => l.id === id);
            const selectEl = document.getElementById(`ai-select-${id}`);
            const selectedAI = selectEl.value;

            // Collect all slide content for context
            let slideContextLines = lesson.slides.map((s, idx) => {
                return `[슬라이드 ${idx + 1}: ${s.title}]\n- 내용: ${s.diagram}\n- 핵심: ${s.desc}`;
            }).join('\n\n');

            const fullPrompt = `나는 아주아주 초보자야. 내가 지금 학습 중인 주제는 '${lesson.title}'이야.\n\n내가 공부한 핵심 내용은 다음과 같아:\n${slideContextLines}\n\n이 내용을 바탕으로 나를 멘토링 해줘. 이 내용을 매우 쉽게 다시 설명해주고, 심도 있는 추가 학습을 위해 내가 알아야 할 연관 주제 3개를 제시해줘.`;

            navigator.clipboard.writeText(fullPrompt).then(() => {
                showToast();
                setTimeout(() => {
                    const url = aiUrls[selectedAI];
                    if (url) window.open(url, '_blank');
                }, 1000);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-32');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-32');
            }, 3000);
        }

        // 3 & 5. Slide Modal Logic (Mega Scale & Links)
        let currentSession = null;
        let currentSlideIndex = 0;

        const modal = document.getElementById('slide-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalBadge = document.getElementById('modal-session-badge');
        const slideTitleEl = document.getElementById('slide-title');
        const slideDescEl = document.getElementById('slide-desc');
        const slideDiagramEl = document.getElementById('slide-diagram');
        const slideLinksEl = document.getElementById('slide-links');
        const slideBadge = document.getElementById('slide-badge');
        const slideIndicator = document.getElementById('slide-indicator');
        const slideCanvas = document.getElementById('slide-canvas');

        const btnPrev = document.getElementById('btn-prev-slide');
        const btnNext = document.getElementById('btn-next-slide');
        const btnPrevMobile = document.getElementById('btn-prev-mobile');
        const btnNextMobile = document.getElementById('btn-next-mobile');

        function openSlides(lessonId) {
            currentSession = lessonData.find(l => l.id === lessonId);
            currentSlideIndex = 0;

            modalTitle.textContent = currentSession.title;
            modalBadge.textContent = `Session ${String(currentSession.id).padStart(2, '0')}`;

            renderSlide();

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0', 'translate-y-4');
                modal.classList.add('opacity-100', 'translate-y-0');
            }, 50);
            document.body.style.overflow = 'hidden';
        }

        function closeSlides() {
            modal.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
            document.body.style.overflow = 'auto';
        }

        document.getElementById('btn-close-modal').addEventListener('click', closeSlides);

        function renderSlide() {
            const slide = currentSession.slides[currentSlideIndex];
            const total = currentSession.slides.length;

            // Update content
            slideBadge.textContent = `SLIDE ${String(currentSlideIndex + 1).padStart(2, '0')}`;
            slideTitleEl.innerHTML = formatMarkdown(slide.title);
            slideDiagramEl.innerHTML = formatMarkdown(slide.diagram);
            slideDescEl.innerHTML = formatMarkdown(slide.desc);
            slideIndicator.textContent = `${String(currentSlideIndex + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;

            // Render Links
            slideLinksEl.innerHTML = '';
            if (slide.links && slide.links.length > 0) {
                slide.links.forEach(link => {
                    const btn = document.createElement('a');
                    btn.href = link.url;
                    btn.target = '_blank';
                    btn.className = "flex items-center gap-2 px-6 py-3 bg-white/10 hover:bg-white/20 text-white rounded-2xl text-lg font-bold border border-white/10 transition-all active:scale-95";
                    btn.innerHTML = `<i data-lucide="external-link" class="w-5 h-5"></i> ${link.name}`;
                    slideLinksEl.appendChild(btn);
                });
                lucide.createIcons();
            }

            // Button states
            btnPrev.disabled = currentSlideIndex === 0;
            btnNext.disabled = currentSlideIndex === total - 1;
            btnPrevMobile.disabled = currentSlideIndex === 0;
            btnNextMobile.disabled = currentSlideIndex === total - 1;

            // Flash effect
            slideCanvas.style.opacity = '0';
            slideCanvas.style.transform = 'translateY(10px)';
            setTimeout(() => {
                slideCanvas.style.opacity = '1';
                slideCanvas.style.transform = 'translateY(0)';
            }, 100);
        }

        function nextSlide() { if (currentSlideIndex < currentSession.slides.length - 1) { currentSlideIndex++; renderSlide(); } }
        function prevSlide() { if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); } }

        btnNext.addEventListener('click', nextSlide);
        btnPrev.addEventListener('click', prevSlide);
        btnNextMobile.addEventListener('click', nextSlide);
        btnPrevMobile.addEventListener('click', prevSlide);

        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('hidden')) {
                if (e.key === 'ArrowRight') nextSlide();
                if (e.key === 'ArrowLeft') prevSlide();
                if (e.key === 'Escape') closeSlides();
            }
        });
    </script>
</body>
