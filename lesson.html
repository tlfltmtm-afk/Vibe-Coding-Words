<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바이브 코딩 - 레슨 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5', // Indigo 600
                        darkBg: '#f8fafc', // Slate 50
                        cardBg: '#ffffff',
                        accent: '#6366f1'
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.02em;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .accordion-content.open {
            max-height: 3000px;
            padding-top: 1.5rem;
            padding-bottom: 2rem;
        }

        .chevron-icon {
            transition: transform 0.3s ease;
        }

        .chevron-icon.rotated {
            transform: rotate(180deg);
        }

        .slide-content {
            white-space: pre-wrap;
            word-break: keep-all;
        }

        .slide-content strong {
            color: #4f46e5;
            font-weight: 800;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '▼';
            font-size: 8px;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #94a3b8;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <main class="flex-1 w-full overflow-y-auto custom-scrollbar p-4 md:p-8 relative bg-slate-50/50">
        <div class="max-w-5xl mx-auto space-y-4 pb-20" id="accordion-container">
        </div>
    </main>

    <div id="slide-modal"
        class="fixed inset-0 bg-white z-50 hidden flex-col transition-all duration-500 opacity-0 translate-y-8">

        <div
            class="flex justify-between items-center px-4 md:px-8 py-2.5 border-b border-slate-100 bg-white/95 backdrop-blur-xl sticky top-0 z-30 shrink-0">
            <div class="flex items-center gap-3 overflow-hidden">
                <div id="modal-session-badge"
                    class="px-2.5 py-1 bg-indigo-600 text-white rounded-md text-[10px] font-black tracking-tight shrink-0">
                    S01
                </div>
                <div class="flex items-center gap-2 md:gap-3 overflow-hidden">
                    <h2 id="modal-title"
                        class="text-[11px] md:text-xs font-bold text-slate-400 tracking-tighter truncate max-w-[100px] md:max-w-xs uppercase">
                        차시 제목</h2>
                </div>
            </div>
            <button id="btn-close-modal"
                class="p-2 bg-orange-100 hover:bg-orange-500 rounded-lg transition-all group border border-transparent shrink-0">
                <i data-lucide="x" class="w-5 h-5 text-orange-600 group-hover:text-white duration-300"></i>
            </button>
        </div>

        <div class="flex-1 flex overflow-hidden relative bg-slate-50/30">
            <div class="hidden xl:flex items-center justify-center w-20 shrink-0 z-30">
                <button id="btn-prev-slide"
                    class="p-3 bg-orange-50 hover:bg-orange-500 rounded-full transition-all text-orange-500 hover:text-white hover:shadow-md disabled:opacity-0 group">
                    <i data-lucide="chevron-left" class="w-8 h-8 group-hover:-translate-x-1 duration-300"></i>
                </button>
            </div>

            <div id="slide-scroll-area"
                class="flex-1 overflow-y-auto custom-scrollbar px-4 py-6 md:py-10 relative w-full">
                <div class="max-w-[900px] mx-auto flex flex-col justify-center min-h-full">

                    <div class="mb-5 flex flex-col md:flex-row items-center justify-center md:justify-start gap-3 md:gap-4">
                        <span id="slide-badge"
                            class="inline-block px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-[10px] md:text-xs font-black tracking-widest uppercase border border-indigo-100/50 shrink-0">STAGE
                            01</span>
                        <h3 id="slide-title"
                            class="text-lg md:text-2xl font-black text-slate-900 tracking-tight text-center md:text-left italic">
                            슬라이드 제목
                        </h3>
                    </div>

                    <div
                        class="bg-slate-50 rounded-[1.5rem] p-6 md:p-10 mb-4 border border-slate-200/60 shadow-sm relative overflow-hidden flex flex-col items-center justify-center min-h-[200px] md:min-h-[260px]">
                        <div id="slide-watermark"
                            class="absolute -right-2 -bottom-6 text-[10rem] font-black text-slate-200/40 select-none pointer-events-none tracking-tighter leading-none z-0">
                            01
                        </div>

                        <p id="slide-diagram"
                            class="text-lg md:text-2xl font-bold text-slate-800 tracking-tight leading-[1.5] text-center z-10 w-full slide-content break-keep">
                            도식 내용
                        </p>
                    </div>

                    <div
                        class="bg-white border border-slate-200 rounded-[1.5rem] p-6 md:p-8 flex flex-col md:flex-row gap-5 shadow-sm">
                        <div class="shrink-0 flex items-center gap-3 justify-center md:justify-start">
                            <div
                                class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center shadow-inner border border-indigo-100">
                                <i data-lucide="bot" class="w-6 h-6 text-indigo-600"></i>
                            </div>
                            <span class="font-black text-indigo-600 text-sm md:text-base">AI 멘토</span>
                        </div>
                        <div class="space-y-2 w-full">
                            <span
                                class="text-indigo-600 font-black text-[10px] tracking-widest uppercase block text-center md:text-left">Expert
                                Insights</span>
                            <p id="slide-desc"
                                class="text-[14px] md:text-[16px] text-slate-600 slide-content leading-[1.7] font-medium break-keep">
                                상세 설명 내용
                            </p>
                            <div id="slide-links" class="pt-2 flex flex-wrap gap-2 justify-center md:justify-start">
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="hidden xl:flex items-center justify-center w-20 shrink-0 z-30">
                <button id="btn-next-slide"
                    class="p-3 bg-orange-50 hover:bg-orange-500 rounded-full transition-all text-orange-500 hover:text-white hover:shadow-lg disabled:opacity-0 group">
                    <i data-lucide="chevron-right" class="w-8 h-8 group-hover:translate-x-1 duration-300"></i>
                </button>
            </div>
        </div>

        <div
            class="h-12 md:h-14 flex items-center justify-between px-6 md:px-10 fixed bottom-0 w-full bg-white border-t border-slate-100 z-40 shrink-0">
            <div class="flex items-center gap-4">
                <div class="flex xl:hidden gap-1.5">
                    <button id="btn-prev-mobile"
                        class="p-2 bg-orange-50 border border-orange-200 rounded-lg text-orange-500 active:scale-95 transition-all"><i
                            data-lucide="chevron-left" class="w-4 h-4"></i></button>
                    <button id="btn-next-mobile"
                        class="p-2 bg-orange-50 border border-orange-200 rounded-lg text-orange-500 active:scale-95 transition-all"><i
                            data-lucide="chevron-right" class="w-4 h-4"></i></button>
                </div>
                <div id="slide-indicator" class="text-sm md:text-base font-black text-slate-300 italic tracking-widest">
                    01 / 03
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="w-32 md:w-48 h-1 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500 rounded-full"
                        style="width: 33%"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"
        class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 md:px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-4 transform translate-y-40 opacity-0 transition-all duration-500 z-50 w-[90%] sm:w-auto">
        <div
            class="w-8 h-8 md:w-10 md:h-10 bg-indigo-500 rounded-full flex items-center justify-center shadow-lg shrink-0">
            <i data-lucide="check" class="w-4 h-4 md:w-5 md:h-5"></i>
        </div>
        <div>
            <p class="font-black text-sm md:text-base tracking-tight">COPIED!</p>
            <p class="text-[11px] md:text-xs text-slate-300 font-medium mt-0.5">프롬프트가 클립보드에 복사되었습니다.</p>
        </div>
    </div>

    <!-- 관련 링크 플로팅 버튼 및 팝업 -->
    <div class="fixed bottom-20 right-6 z-50 flex flex-col items-end gap-4">
        <!-- 팝업 아코디언 -->
        <div id="links-popup" class="hidden w-72 md:w-80 bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden transition-all duration-300 translate-y-4 opacity-0 max-h-[70vh] flex flex-col">
            <div class="p-4 bg-indigo-600 text-white flex items-center justify-between shrink-0">
                <div class="flex items-center gap-2">
                    <i data-lucide="link" class="w-4 h-4"></i>
                    <span class="font-black text-sm tracking-tight">관련 링크 모음</span>
                </div>
                <button onclick="toggleLinksPopup()" class="p-1 hover:bg-white/20 rounded-lg transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="links-popup-content" class="overflow-y-auto custom-scrollbar p-2 space-y-2 bg-slate-50/50">
                <!-- 여기에 동적으로 링크들이 추가됩니다 -->
            </div>
        </div>

        <!-- 플로팅 버튼 -->
        <button id="btn-links-toggle" onclick="toggleLinksPopup()" 
            class="w-14 h-14 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full shadow-lg flex items-center justify-center transition-all active:scale-90 group">
            <i data-lucide="link" class="w-6 h-6 group-hover:rotate-12 transition-transform"></i>
        </button>
    </div>

    <script src="lesson.js"></script>
</body>

</html>
