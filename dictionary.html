<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>용어 설명</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="data.js"></script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>

<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row gap-4 mb-8 sticky top-0 bg-slate-50/90 backdrop-blur-sm py-2 z-10">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input type="text" id="dic-search" placeholder="찾고 싶은 용어를 입력하세요..."
                    class="w-full pl-12 pr-4 py-4 bg-white border-2 border-slate-200 rounded-2xl focus:border-indigo-500 outline-none transition-all shadow-sm">
            </div>
            <select id="dic-cat"
                class="px-6 py-4 bg-white border-2 border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-indigo-500 shadow-sm">
            </select>
        </div>

        <div id="dic-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const grid = document.getElementById('dic-grid');
        const searchInput = document.getElementById('dic-search');
        const catSelect = document.getElementById('dic-cat');

        function render() {
            const query = searchInput.value.toLowerCase();
            const cat = catSelect.value;

            grid.innerHTML = DB.filter(item => {
                const matchSearch = item.term.toLowerCase().includes(query) || item.shortDesc.includes(query);
                const matchCat = cat === '전체보기' || item.category === cat;
                return matchSearch && matchCat;
            }).map(item => `
                <div class="bg-white p-6 rounded-[24px] border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all group">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-indigo-50 group-hover:scale-110 transition-all">${item.icon}</div>
                        <span class="px-3 py-1 bg-slate-100 text-slate-500 rounded-lg text-[11px] font-bold tracking-tight">${item.category}</span>
                    </div>
                    <h3 class="text-xl font-extrabold text-slate-900 mb-2">${item.term}</h3>
                    <p class="text-slate-600 text-sm leading-relaxed mb-4">${item.shortDesc}</p>
                    <div class="pt-4 border-t border-slate-100 text-[13px] text-slate-500 leading-snug italic">${item.detailDesc}</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Initialize
        catSelect.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        searchInput.oninput = render;
        catSelect.onchange = render;
        window.onload = render;
    </script>
</body>

</html>
