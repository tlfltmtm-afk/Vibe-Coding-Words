<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바이브 코딩 - 디자인 컨셉</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .preview-window {
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.15);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Toast logic */
        #toast {
            visibility: hidden;
            opacity: 0;
            transform: translate(-50%, 20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, 0);
        }
        
        .bg-stripes {
            background-image: linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 50%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.05) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- Header (Consistent with main index.html) -->
    <header class="bg-white border-b border-slate-200 z-30 px-6 py-3 flex justify-between items-center shrink-0 shadow-sm">
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-xl font-extrabold text-indigo-700 flex items-center gap-2 hover:opacity-80 transition-opacity">
                <span class="text-2xl bg-indigo-100 text-indigo-600 w-10 h-10 flex items-center justify-center rounded-xl shadow-inner">✨</span> 
                바이브 코딩 사전
            </a>
            <div class="h-6 w-px bg-slate-200"></div>
            <h2 class="text-slate-500 font-bold flex items-center gap-2">
                <span class="text-xs px-2 py-0.5 bg-slate-100 rounded-md border border-slate-200">Module</span>
                디자인 컨셉 갤러리
            </h2>
        </div>

        <nav class="flex gap-2">
            <a href="index.html" class="px-4 py-2 rounded-xl font-semibold text-[15px] text-slate-500 hover:bg-slate-100 transition-all flex items-center gap-2">
                <span>🏠</span> 메인으로 돌아가기
            </a>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar: Concept List (Left) -->
        <aside class="w-[320px] bg-white border-r border-slate-200 flex flex-col overflow-hidden shrink-0">
            <div class="p-5 border-b border-slate-100 bg-slate-50/30">
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">Pick a concept</p>
                <h3 class="text-lg font-extrabold text-slate-800 tracking-tight">웹 디자인 색상 조합 (10)</h3>
            </div>
            <div id="concept-list" class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2">
                <!-- Buttons injected by JS -->
            </div>
        </aside>

        <!-- Preview Area (Right) -->
        <section class="flex-1 bg-slate-100 relative flex flex-col items-center justify-center p-8 overflow-hidden">
            
            <!-- Global Copy Action (Fixed Top) -->
            <div class="absolute top-6 left-1/2 -translate-x-1/2 z-20 flex items-center gap-6 bg-white/90 backdrop-blur-md px-8 py-4 rounded-3xl border border-white shadow-[0_20px_50px_-15px_rgba(0,0,0,0.1)]">
                <div class="flex flex-col">
                    <span id="concept-name-display" class="font-extrabold text-slate-800 text-base">--</span>
                    <span class="text-[11px] text-slate-400 font-bold uppercase tracking-wide">시스템 컬러 시스템 및 가이드 코드</span>
                </div>
                <button onclick="copyConceptCode()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black px-6 py-3 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center gap-2 text-sm">
                    📋 컨셉 코드 복사
                </button>
            </div>

            <!-- Fake Browser Container -->
            <div id="preview-box" class="preview-window w-full h-full max-w-[1240px] max-h-[820px] bg-white rounded-3xl overflow-hidden flex flex-col border border-white relative mt-12">
                <!-- Interactive Fake Site injected here -->
            </div>

        </section>

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 bg-slate-800/95 backdrop-blur-md text-white px-8 py-4 rounded-2xl shadow-2xl z-50 flex items-center gap-3 font-semibold pointer-events-none border border-slate-700">
        <div class="w-7 h-7 rounded-full bg-green-500/20 text-green-400 flex items-center justify-center border border-green-500/30">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <span id="toast-msg" class="tracking-wide text-[16px]">컨셉 코드가 클립보드에 복사되었습니다!</span>
    </div>

                tag: "활동적인 스포츠 및 마케팅",
                colors: { primary: "#F97316", secondary: "#FFF7ED", text: "#431407", bg: "#FFFFFF", accent: "#E11D48", border: "#FFEDD5" },

            },
            {

                tag: "고급스러운 프리미엄 브랜드",

            },
            {
                id: 7,
                name: "Deep Ocean Cyan",
                tag: "지적인 연구 및 탐구 컨셉",

                colors: { primary: "#18181B", secondary: "#F4F4F5", text: "#09090B", bg: "#FFFFFF", accent: "#71717A", border: "#E4E4E7" },

                blueprint: "::: DESIGN BLUEPRINT :::\nConcept: Mono Industrial Black\n- Primary: #18181B (Zinc-900)\n- Sub: #F4F4F5 (Zinc-100)\n- Text: #09090B (Black)\n- Accent: #71717A\nGuide: Architect portfolios, street fashion, or luxury gadget stores."
            },
            {
                id: 10,
                name: "Neon Cyber Tech",
                tag: "우주와 메타버스 테마",
                colors: { primary: "#22D3EE", secondary: "#083344", text: "#ECFEFF", bg: "#020617", accent: "#06B6D4", border: "#164E63" },
                desc: "극단적인 블랙 배경에 네온 사이안 컬러를 입혀 가상 현실 테마를 시각화합니다.",
                blueprint: "::: DESIGN BLUEPRINT :::\nConcept: Neon Cyber Tech\n- Primary: #22D3EE (Neon Cyan)\n- Bg: #020617 (Midnight-950)\n- Sub: #083344 (Highlight)\n- Text: #ECFEFF\nGuide: Metaverse, gaming community, or high-tech blockchain sites."
            }
        ];

        let currentId = 1;

        function renderList() {
            const list = document.getElementById('concept-list');
            list.innerHTML = CONCEPTS.map(c => `
                <button onclick="selectConcept(${c.id})" class="w-full text-left p-4 rounded-2xl transition-all border ${currentId === c.id ? 'bg-indigo-50 border-indigo-200 shadow-sm' : 'bg-white border-transparent hover:bg-slate-50'} flex gap-4 items-center group">
                    <div class="w-10 h-10 rounded-full border border-slate-200 shadow-inner shrink-0" style="background-color: ${c.colors.primary}"></div>
                    <div class="flex-1 overflow-hidden">
                        <p class="font-extrabold text-sm text-slate-800 truncate">${c.name}</p>
                        <p class="text-[10px] text-slate-400 font-bold truncate">${c.tag}</p>
                    </div>
                </button>
            `).join('');
        }

        function selectConcept(id) {
            currentId = id;
            const c = CONCEPTS.find(item => item.id === id);
            document.getElementById('concept-name-display').innerText = `${c.id}. ${c.name}`;
            renderList();
            renderPreview(c);
        }

        function renderPreview(c) {
            const box = document.getElementById('preview-box');
            const isDark = (c.bg !== "#FFFFFF");
            
            box.innerHTML = `
                <div class="h-full flex flex-col font-sans transition-all duration-700 animate-[fadeIn_0.5s]" style="background-color: ${c.colors.bg}; color: ${c.colors.text}">
                    
                    <!-- Fake UI Top Bar -->
                    <header class="px-8 py-5 flex justify-between items-center shadow-sm relative z-10" style="background-color: ${c.colors.bg}; border-bottom: 1px solid ${c.colors.primary}22">
                        <div class="flex items-center gap-3 font-black text-xl tracking-tighter">
                            <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white shadow-lg" style="background-color: ${c.colors.primary}">C</div>
                            <span>CONCEPT ${c.id}</span>
                        </div>
                        <nav class="flex gap-8 text-[13px] font-extrabold opacity-60">
                            <span class="hover:opacity-100 cursor-pointer">제품소개</span>
                            <span class="hover:opacity-100 cursor-pointer">기술지원</span>
                            <span class="hover:opacity-100 cursor-pointer">브랜드</span>
                        </nav>
                        <button class="px-6 py-2.5 rounded-full text-xs font-black text-white shadow-xl hover:opacity-90 transition-all" style="background-color: ${c.colors.primary}">FREE START</button>
                    </header>

                        <!-- Sidebar Area -->

                            <div class="space-y-3">
                                <div class="h-2 w-3/4 rounded-full opacity-30" style="background-color: ${c.colors.primary}"></div>
                                <div class="h-2 w-full rounded-full opacity-20" style="background-color: ${c.colors.primary}"></div>
                                <div class="h-2 w-1/2 rounded-full opacity-20" style="background-color: ${c.colors.primary}"></div>
                            </div>
                            <div class="pt-8 space-y-3">
                                <div class="h-10 rounded-xl" style="background-color: ${c.colors.primary}11"></div>
                                <div class="h-10 rounded-xl" style="background-color: ${c.colors.primary}11"></div>
                                <div class="h-10 rounded-xl" style="background-color: ${c.colors.primary}11"></div>
                            </div>
                        </aside>

                        <!-- Central Content -->
                        <div class="flex-1 p-12 overflow-auto relative custom-scrollbar">
                            <div class="max-w-xl animate-[slideUp_0.4s]">
                                <span class="px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase mb-4 inline-block shadow-sm" style="background-color: ${c.colors.primary}; color: white">Trending Style</span>
                                <h1 class="text-5xl font-black mb-6 leading-[1.1] tracking-tighter">당신의 웹사이트를 위한<br><span style="color: ${c.colors.primary}">완벽한 영감</span></h1>
                                <p class="text-lg opacity-60 leading-relaxed max-w-md mb-10">${c.desc}</p>
                                
                                <!-- Search bar UI -->
                                <div class="relative max-w-sm mb-12 group">
                                    <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none opacity-40">🔍</div>
                                    <input type="text" placeholder="지금 검색해보세요" class="w-full pl-12 pr-6 py-4 rounded-2xl border-2 shadow-xl outline-none transition-all focus:ring-4" style="background-color: ${c.colors.bg}; border-color: ${c.colors.primary}33; --tw-ring-color: ${c.colors.primary}22">
                                </div>

                                <!-- Feature Grid -->
                                <div class="grid grid-cols-2 gap-6 pb-20">
                                    <div class="p-8 rounded-3xl border-2 flex flex-col gap-5 shadow-sm group hover:scale-[1.02] transition-transform" style="border-color: ${c.colors.primary}11; background-color: ${c.colors.bg}">
                                        <div class="w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center text-xl" style="background-color: ${c.colors.secondary}">💎</div>
                                        <div class="h-4 w-1/2 rounded-full" style="background-color: ${c.colors.primary}22"></div>
                                        <div class="h-2 w-full rounded-full opacity-40" style="background-color: ${c.colors.primary}11"></div>
                                    </div>
                                    <div class="p-8 rounded-3xl border-2 flex flex-col gap-5 shadow-sm group hover:scale-[1.02] transition-transform" style="border-color: ${c.colors.primary}11; background-color: ${c.colors.bg}">

                                        <div class="h-4 w-1/2 rounded-full" style="background-color: ${c.colors.primary}22"></div>
                                        <div class="h-2 w-full rounded-full opacity-40" style="background-color: ${c.colors.primary}11"></div>
                                    </div>
                                </div>
                            </div>

                            <!-- Floating Action Button -->
                            <button class="absolute bottom-10 right-10 w-16 h-16 rounded-3xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.3)] flex items-center justify-center text-white text-3xl transition-all hover:scale-110 active:scale-95 hover:rotate-6" style="background-color: ${c.colors.accent}; shadow: 0 20px 40px ${c.colors.accent}44">
                                ⚡
                            </button>
                        </div>
                    </main>

                    <!-- Bottom Bar -->
                    <footer class="px-8 py-4 text-[11px] font-extrabold text-center opacity-30 border-t tracking-widest" style="border-top-color: ${c.colors.primary}11">
                        &copy; 2026 DESIGN CONCEPT NO.${c.id} LAB.
                    </footer>
                </div>
            `;
        }

        function copyConceptCode() {
            const c = CONCEPTS.find(item => item.id === currentId);
            const text = c.blueprint;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => showToast());
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast();
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        window.onload = () => {
            renderList();
            selectConcept(1);
        };

</body>
</html>
