<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>용어 실습</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="data.js"></script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-white flex">
    <aside class="w-80 border-r border-slate-200 flex flex-col bg-slate-50">
        <div class="p-5 border-b border-slate-200 bg-white">
            <h2 class="font-black text-slate-900 flex items-center gap-2">
                <i data-lucide="play-circle" class="w-5 h-5 text-indigo-600"></i> 실습 리스트
            </h2>
        </div>
        <div id="sbx-list" class="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar"></div>
    </aside>

    <main class="flex-1 flex flex-col bg-slate-100 p-6 overflow-hidden">
        <div id="sbx-content" class="h-full flex flex-col gap-6">
        </div>
    </main>

    <script>
        const listEl = document.getElementById('sbx-list');
        const contentEl = document.getElementById('sbx-content');
        let currentId = 1;

        function renderList() {
            listEl.innerHTML = DB.map(item => `
                <button onclick="selectItem(${item.id})" class="w-full p-4 rounded-2xl text-left transition-all ${currentId === item.id ? 'bg-white shadow-md border-indigo-200 border-2' : 'hover:bg-white/50 text-slate-500'}">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">${item.icon}</span>
                        <span class="font-bold text-[14px]">${item.term}</span>
                    </div>
                </button>
            `).join('');
        }

        function selectItem(id) {
            currentId = id;
            const item = DB.find(i => i.id === id);
            contentEl.innerHTML = `
                <div class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-6 overflow-hidden">
                    <div class="flex flex-col gap-4 overflow-hidden">
                        <div class="bg-white rounded-[24px] p-6 shadow-sm border border-slate-200">
                            <h3 class="text-2xl font-black text-slate-900 mb-2">${item.term}</h3>
                            <p class="text-slate-500 text-sm">${item.detailDesc}</p>
                        </div>
                        <div class="flex-1 bg-slate-900 rounded-[24px] p-6 font-mono text-indigo-300 text-sm overflow-auto relative group">
                            <div class="absolute top-4 right-4 text-[10px] text-slate-500 font-bold tracking-widest uppercase">HTML Code</div>
                            <pre class="whitespace-pre-wrap leading-relaxed">${item.actionPrompt}</pre>
                        </div>
                    </div>
                    <div class="bg-white rounded-[32px] shadow-xl border-4 border-slate-200 overflow-hidden flex flex-col relative group">
                        <div class="h-10 bg-slate-100 border-b border-slate-200 flex items-center px-4 gap-1.5">
                            <div class="w-2.5 h-2.5 rounded-full bg-red-400"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-amber-400"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-emerald-400"></div>
                        </div>
                        <div class="flex-1 overflow-auto bg-white relative p-4" id="preview-area"></div>
                    </div>
                </div>
            `;
            item.render(document.getElementById('preview-area'));
            renderList();
            lucide.createIcons();
        }

        window.onload = () => selectItem(1);
    </script>
</body>

</html>
